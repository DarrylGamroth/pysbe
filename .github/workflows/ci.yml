name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

env:
  JAVA_VERSION: "17"
  SBE_VERSION: "1.37.1"

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Type check
        run: python -m mypy src

      - name: Unit tests
        run: python -m pytest -q -m "not integration"

  integration-java-interop:
    needs: lint-type-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Download SBE all-in-one JAR from Maven Central
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import urllib.request

          version = os.environ["SBE_VERSION"]

          jar_url = (
              "https://repo1.maven.org/maven2/uk/co/real-logic/"
              f"sbe-all/{version}/sbe-all-{version}.jar"
          )
          jar_path = pathlib.Path("sbe-all.jar").resolve()
          with urllib.request.urlopen(jar_url, timeout=60) as response:
              jar_path.write_bytes(response.read())

          print(f"Downloaded sbe-all {version} -> {jar_path}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"SBE_VERSION={version}\n")
              env_file.write(f"SBE_JAR_PATH={jar_path}\n")
          PY

      - name: Cross-language interop test
        run: python -m pytest -q tests/integration/test_java_interop.py

  build-dist:
    needs: integration-java-interop
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and validate distributions
        run: |
          python -m pip install -U pip
          python -m pip install build twine
          python -m build --sdist --wheel
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: pysbe-dist
          path: dist/*
